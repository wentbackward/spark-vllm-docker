# Recipe: Qwen/Qwen3-4B-Instruct-2507
# Tool-calling focused model, 87.9% single-turn accuracy on BFCL V4
# Non-thinking model — fast and decisive, no <think> blocks

recipe_version: "1"
name: Qwen3-4B-Instruct
description: vLLM serving Qwen3-4B-Instruct-2507 (tool calling)

model: Qwen/Qwen3-4B-Instruct-2507

container: vllm-node

mods: []

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.15
  max_model_len: 24576

command: |
  vllm serve Qwen/Qwen3-4B-Instruct-2507 \
    --host {host} \
    --port {port} \
    --max-model-len {max_model_len} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --enable-auto-tool-choice \
    --tool-call-parser hermes \
    --kv-cache-dtype fp8 \
    --enable-prefix-caching \
    --enforce_eager \
    -tp {tensor_parallel}
