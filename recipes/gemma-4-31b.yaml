# Recipe: google/gemma-4-31B-it
# Gemma 4 Dense: 31B params, multimodal (text + image)
# 256K context, native tool calling, thinking mode
# ~62 GiB BF16 — runs solo only on Spark

recipe_version: "1"
name: Gemma-4-31B
description: vLLM serving Gemma-4-31B-it (dense, multimodal)

model: google/gemma-4-31B-it

solo_only: true

container: vllm-node

mods: []

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.60
  max_model_len: 65536
  max_num_batched_tokens: 16384

command: |
  vllm serve google/gemma-4-31B-it \
    --host {host} \
    --port {port} \
    --max-model-len {max_model_len} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --enable-auto-tool-choice \
    --tool-call-parser functiongemma \
    --kv-cache-dtype fp8 \
    --enable-prefix-caching \
    --enforce_eager \
    -tp {tensor_parallel}
