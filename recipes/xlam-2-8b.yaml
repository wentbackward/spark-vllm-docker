# Recipe: Salesforce/Llama-xLAM-2-8b-fc-r
# Top-scoring small tool-calling model on BFCL V4 (46.7% overall, 70% multi-turn)
# Based on Llama 3.1 8B. License: CC-BY-NC-4.0 (non-commercial)

recipe_version: "1"
name: xLAM-2-8B
description: vLLM serving xLAM-2-8b-fc-r (tool calling)

model: Salesforce/Llama-xLAM-2-8b-fc-r

container: vllm-node

mods: []

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.20
  max_model_len: 24576

command: |
  vllm serve Salesforce/Llama-xLAM-2-8b-fc-r \
    --host {host} \
    --port {port} \
    --max-model-len {max_model_len} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --enable-auto-tool-choice \
    --tool-call-parser xlam \
    --kv-cache-dtype fp8 \
    --enable-prefix-caching \
    --enforce_eager \
    -tp {tensor_parallel}
