# Recipe: AxionML/Qwen3.5-9B-NVFP4
# Qwen3.5-9B quantized to NVFP4 (~17.7 GiB weights)
# Multimodal: text + image + video

recipe_version: "1"
name: Qwen35-9B-NVFP4
description: vLLM serving Qwen3.5-9B NVFP4

# HuggingFace model to download (optional, for --download-model)
model: AxionML/Qwen3.5-9B-NVFP4

# Container image to use
container: vllm-node

mods:
  - mods/fix-qwen3-coder-next
  - mods/fix-qwen3.5-chat-template

# Default settings (can be overridden via CLI)
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.22
  max_model_len: 131072
  max_num_batched_tokens: 4096

# Environment variables
env:
  VLLM_NVFP4_GEMM_BACKEND: marlin
  VLLM_USE_FLASHINFER_MOE_FP4: "0"
  VLLM_TEST_FORCE_FP8_MARLIN: "1"

  # The vLLM serve command template
command: |
  vllm serve AxionML/Qwen3.5-9B-NVFP4 \
    --host {host} \
    --port {port} \
    --max-model-len {max_model_len} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --enable-auto-tool-choice \
    --reasoning-parser qwen3 \
    --tool-call-parser qwen3_coder \
    --kv-cache-dtype fp8 \
    --enforce_eager \
    --enable-chunked-prefill \
    --max-num-seqs 8 \
    --load-format fastsafetensors \
    --enable-prefix-caching \
    --chat-template unsloth.jinja \
    -tp {tensor_parallel}



    #--attention-backend flashinfer \
